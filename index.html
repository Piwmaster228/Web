<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This e-commerce platform offers a seamless shopping experience with a modern design, featuring product listings, detailed views, and an intuitive cart system for users.">
    <meta name="title" content="E-commerce Website Design">
    <meta name="robots" content="noindex">
    <meta name="twitter:card" content="summary_large_image">

    <meta name="twitter:title" content="E-commerce Website Design">
    <meta name="twitter:description" content="This e-commerce platform offers a seamless shopping experience with a modern design, featuring product listings, detailed views, and an intuitive cart system for users.">
    <meta property="og:title" content="E-commerce Website Design">
    <meta property="og:description" content="This e-commerce platform offers a seamless shopping experience with a modern design, featuring product listings, detailed views, and an intuitive cart system for users.">
    <meta property="og:type" content="website">

    <title>E-commerce Website Design</title>

    <link rel="stylesheet" href="css/main.css">
</head>

<body>
<header class="header">
    <div class="container">
        <div class="header-inner">
            <a href="/" class="logo">
                <div class="logo-icon">T</div>
                <span class="logo-text">TechStore</span>
            </a>

            <nav class="nav">
                <a href="/" class="nav-link">Products</a>
                <a href="/categories" class="nav-link">Categories</a>
                <a href="/deals" class="nav-link">Deals</a>
                <a href="/about" class="nav-link">About</a>
            </nav>

            <div class="header-actions">
                <button class="icon-button" aria-label="Search">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="M21 21L16.7 16.7"></path>
                    </svg>
                </button>

                <a href="/cart" class="icon-button" aria-label="Shopping cart">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="8" cy="21" r="1"></circle>
                        <circle cx="19" cy="21" r="1"></circle>
                        <path d="M2 2H4L6.7 14.4C6.9 15.4 7.8 16 8.8 16H18.6C19.6 16 20.4 15.3 20.6 14.4L22 7H5"></path>
                    </svg>
                </a>

                <button class="icon-button mobile-menu-button" aria-label="Menu">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</header>
    
</body>
</html>
